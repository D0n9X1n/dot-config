# WezTerm-compatible default keymap for SonicTerm Terminal.
# On macOS, `cmd` is used; on Linux, `ctrl` is the equivalent — `ctrl+shift`
# matches both. Keys not listed fall through to the terminal.

[meta]
name = "sonicterm-linux-default"
version = "1.0"

# --- Tabs ---
[[binding]]
keys = "ctrl+t"
action = "new_tab"

[[binding]]
keys = "ctrl+shift+/"
action = "show_keymap_cheatsheet"

[[binding]]
keys = "ctrl+shift+w"
action = "close_active_pane_or_tab"

# Linux-native tab navigation alternatives avoid arrow/resize/scroll chords.
[[binding]]
keys = "ctrl+pagedown"
action = "next_tab"

[[binding]]
keys = "ctrl+pageup"
action = "prev_tab"

[[binding]]
keys = "ctrl+tab"
action = "next_tab"

[[binding]]
keys = "ctrl+shift+tab"
action = "prev_tab"

# Ctrl+Shift+Left / Ctrl+Shift+Right — tab navigation arrows on Linux.
# Mirrors macOS Cmd+Left/Right (bound via super+left/right in the shared keymap).
# Plain Ctrl+Arrow is intentionally NOT used: shells/readline use Ctrl+Left/Right
# to jump words, and stealing them would break that muscle memory.
[[binding]]
keys = "ctrl+shift+left"
action = "prev_tab"

[[binding]]
keys = "ctrl+shift+right"
action = "next_tab"

[[binding]]
keys = "ctrl+shift+1"
action = { activate_tab = 0 }

[[binding]]
keys = "ctrl+shift+2"
action = { activate_tab = 1 }

[[binding]]
keys = "ctrl+shift+3"
action = { activate_tab = 2 }

[[binding]]
keys = "ctrl+shift+4"
action = { activate_tab = 3 }

[[binding]]
keys = "ctrl+shift+5"
action = { activate_tab = 4 }

[[binding]]
keys = "ctrl+shift+6"
action = { activate_tab = 5 }

[[binding]]
keys = "ctrl+shift+7"
action = { activate_tab = 6 }

[[binding]]
keys = "ctrl+shift+8"
action = { activate_tab = 7 }

[[binding]]
keys = "ctrl+shift+9"
action = "activate_last_tab"

# --- Splits ---
[[binding]]
keys = "ctrl+shift+d"
action = "split_right"

[[binding]]
keys = "ctrl+alt+shift+d"
action = "split_down"

[[binding]]
keys = "ctrl+alt+shift+w"
action = "close_pane"

[[binding]]
keys = "ctrl+shift+z"
action = "toggle_pane_zoom"

[[binding]]
keys = "ctrl+shift+b"
action = { toggle_broadcast = { scope = "tab" } }

[[binding]]
keys = "ctrl+alt+shift+b"
action = { toggle_broadcast = { scope = "all_tabs" } }

# --- Pane focus (vim-style) ---
[[binding]]
keys = "ctrl+shift+h"
action = { focus_pane = "left" }

[[binding]]
keys = "ctrl+shift+j"
action = { focus_pane = "down" }

[[binding]]
keys = "ctrl+shift+k"
action = { focus_pane = "up" }

[[binding]]
keys = "ctrl+shift+l"
action = { focus_pane = "right" }

# Arrow-key split resize: nudge the active divider by 5%.
[[binding]]
keys = "ctrl+alt+shift+left"
action = "resize_pane_left"

[[binding]]
keys = "ctrl+alt+shift+right"
action = "resize_pane_right"

[[binding]]
keys = "ctrl+alt+shift+up"
action = "resize_pane_up"

[[binding]]
keys = "ctrl+alt+shift+down"
action = "resize_pane_down"

# --- Clipboard ---
[[binding]]
keys = "ctrl+shift+["
action = "enter_copy_mode"

[[binding]]
keys = "ctrl+shift+c"
action = "copy_to_clipboard"

[[binding]]
keys = "ctrl+shift+v"
action = "paste_from_clipboard"

# --- Font size ---
[[binding]]
keys = "ctrl+shift+="
action = "increase_font_size"

# Some keyboards/layouts deliver `+` as the character on Shift+= - bind
# both so font-zoom-in works regardless of which the OS surfaces.
[[binding]]
keys = "ctrl+shift++"
action = "increase_font_size"

[[binding]]
keys = "ctrl+shift+-"
action = "decrease_font_size"

[[binding]]
keys = "ctrl+shift+0"
action = "reset_font_size"

# --- Window ---
[[binding]]
keys = "ctrl+shift+n"
action = "new_window"

[[binding]]
keys = "f11"
action = "toggle_fullscreen"

# WezTerm's macOS default for full-screen toggle (mirrors the system
# View -> Enter Full Screen shortcut).
[[binding]]
keys = "ctrl+shift+enter"
action = "toggle_fullscreen"

# --- Search / Palette ---
[[binding]]
keys = "ctrl+shift+f"
action = "open_search"

[[binding]]
keys = "ctrl+shift+p"
action = "open_command_palette"

# Quick select URL hints.
[[binding]]
keys = "ctrl+shift+space"
action = "enter_quick_select"

# --- Scrolling ---
[[binding]]
keys = "ctrl+shift+up"
action = { scroll = "line_up" }

[[binding]]
keys = "ctrl+shift+down"
action = { scroll = "line_down" }

[[binding]]
keys = "ctrl+shift+pageup"
action = { scroll = "page_up" }

[[binding]]
keys = "ctrl+shift+pagedown"
action = { scroll = "page_down" }

[[binding]]
keys = "ctrl+shift+home"
action = { scroll = "to_top" }

[[binding]]
keys = "ctrl+shift+end"
action = { scroll = "to_bottom" }

# --- Reload config ---
[[binding]]
keys = "ctrl+shift+r"
action = "reload_config"

# --- SSH client (example; uncomment + edit target to enable) ---
# Requires building SonicTerm with `--features sonicterm-io/ssh`.
# [[binding]]
# keys = "ctrl+shift+s"
# action = { open_ssh_pane = "alice@dev.example.com:22" }
